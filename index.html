<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Spartan CRM - Modular</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="js/styles.css">
    
    <!-- External scripts -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <!-- PDF.js — used to extract text from uploaded vehicle insurance PDFs
         (parseInsurancePdf in 31a-vehicle-insurance.js). Worker is set on
         the global immediately after load so it's ready before first use. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Recharts (React-based) for Reports tab bar/line/pie charts. React 17
         is used deliberately so rptRenderChart can keep calling the legacy
         ReactDOM.render() API without needing a createRoot migration. Defer
         preserves ordering: React → ReactDOM → Recharts. -->
    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js" defer></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js" defer></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js" defer></script>
    <!-- Twilio Voice SDK v2 — exposes window.Twilio.Device for the phone module.
         Twilio's own sdk.twilio.com CDN only hosts v1 of this library; v2 lives
         on npm as @twilio/voice-sdk and is mirrored on jsDelivr (which we already
         use for Supabase). -->
    <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.11.0/dist/twilio.min.js"></script>
</head>
<body>
    <div id="app"></div>
    
    <script>
        // Early stub for the event-delegation framework (full impl is in
        // modules/07-shared-ui.js, Layer 4). Modules loaded earlier than
        // Layer 4 (e.g., 05-state-auth-rbac.js at Layer 2) call defineAction
        // at top-level and would otherwise throw ReferenceError. This stub
        // queues those early calls; 07-shared-ui drains the queue on load.
        window._earlyActionQueue = [];
        window.defineAction = function(name, handler) {
            window._earlyActionQueue.push([name, handler]);
        };

        // Supabase configuration
        var SUPABASE_URL = 'https://sedpmsgiscowohpqdjza.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_yBluf2LlIAhewDUbNz3f5w_iiCNK6eY';

        console.log('========================================');
        console.log('Spartan CRM - Loading Logical Modules');
        console.log('========================================\n');
        
        const BUILD_VERSION = '20260503x';

        // Logical loading order based on dependencies
        const modules = [
            // Layer 1: Core Foundation
            '01-persistence.js',
            //needed for DEALS
            '02-mock-data.js',
            '02a-mock-factory-data.js',
            '02b-mock-stock-data.js',
            '02c-mock-operator-data.js',
            // 04-cad-integration.js removed 2026-05-02 — CRM-side CAD bridge
            // is being rebuilt by the CAD dev; cad_modules/ is the canonical
            // CAD layer going forward.

            // Layer 2: State & Auth
            '05-state-auth-rbac.js',
            
            // Layer 3: Data Structures
            '03-jobs-workflow.js',
            
            // Layer 4: Shared UI
            '07-shared-ui.js',
            
            // Layer 5: CRM Core (split into orchestrator + 8 sub-modules 2026-05-02)
            '08-sales-crm.js',              // Orchestrator: shared globals, shared helpers
            '08a-sales-mobile.js',          // Mobile today screen, deals kanban, modals
            '08b-sales-dashboard.js',       // Dashboard (desktop & mobile entry point)
            '08c-sales-contacts.js',        // Contacts list, detail, edit, create
            '08d-sales-deals-kanban.js',    // Deals kanban, stage management, DnD
            '08e-sales-deal-detail.js',     // Deal detail, activities, templates
            '08f-sales-deal-transitions.js',// Deal type picker, won/lost/unwind
            '08g-sales-leads-newdeal.js',   // Leads detail, claim, new deal modal
            '08h-sales-scheduler.js',       // Calendar scheduler, job scheduling
            
            // Layer 6: Feature Modules
            '14-google-maps-mock.js',  // mock exports window.initGoogleMaps / refreshMapData — used if no API key / SDK fails
            '13-leads-maps.js',
            '15-jobs-crm.js',
            '22-jobs-page.js',
            
            // Layer 7: Advanced Features
            '16-factory-crm.js',          // core: constants, persistence, mutators
            '16a-factory-glass.js',       // glass ordering subsystem (uses core)
            '16b-factory-profile.js',     // Aluplast profile ordering subsystem (uses core)
            '16c-factory-capacity.js',    // capacity engine + planner page (uses core)
            '16d-factory-pages.js',       // factory page renderers (uses everything above)
            '16e-factory-ops.js',         // Stage 1 ops UI: Jobs to Review, QC checklist, Bay Management, Hold/Variation
            '42-factory-dashboard-v2.js',
            '40-factory-stage2-stock.js',
            '43-factory-stage3-receiving.js',
            '44-factory-stage4-orders-stocktake.js',
            '45-factory-stage5-prodboard11.js',           // Stage 5
            '46-factory-stage6-smartplanner.js',          // Stage 6
            '47-factory-stage7-tablet-operator.js',       // Stage 7
            '48-factory-stage8-service-rework.js',        // Stage 8
            '49-factory-stage9-cost-reports.js',          // Stage 9
            '50-factory-stage10-livefloor-settings.js',   // Stage 10


            // (The js/modules/factory/ v1.0 architecture was retired 2026-05-02 —
            // the only file kept was 26-cad-timing-contract.js, relocated to
            // modules/17b-cad-timing-contract.js and loaded just below.)

            '17-install-schedule.js',
            // CAD Timing Contract — codifies the 11-key station contract,
            // 12 productType enum, install/property/floor enums, and applies the
            // supply_only schedule-side override (spartan-cad-timing-audit.md §4.4).
            // Decorates readJobInstallMinutes from 17 above; consumers just call
            // readJobInstallMinutes(job) — it's been wrapped in place.
            '17b-cad-timing-contract.js',
            '21-cm-schedule.js',
            
            // Layer 8: Financial & Reporting
            '18-accounts-crm.js',
            '25-invoicing.js',
            '26-invoicing-page.js',
            '24-commission.js',
            '09-reports.js',
            
            // Layer 9: Communication
            '06-email-tracking.js',
            '10-integrations.js',
            // Email module split (orchestrator + 7 sub-modules)
            '11-email-page.js',         // Orchestrator (renderEmailPage, renderEmailMobile, state vars, TODO: Maps/Reports/CustomFields)
            '11a-email-compose.js',     // Composer modal, merge picker, send
            '11b-email-views.js',       // Email list, detail, tracking views
            '11c-email-templates.js',   // Template management, merge field binding
            '11d-email-rte.js',         // Rich-text editor toolbar
            '11e-email-signatures.js',  // Email signature management
            '11f-email-sanitize.js',    // HTML sanitization
            '11g-gmail-integration.js',  // Gmail composer and integration
            '28-twilio.js',            // Twilio Voice/SMS — must load AFTER 10-integrations.js (reads getState().gmailToken) and BEFORE 99-init.js (calls twilioInit)
            '14a-google-maps-real.js', // must load AFTER 11-email-page.js so it can wrap the real onGoogleMapsLoaded instead of being clobbered by it

            // Layer 10: Service & Settings
            '19-service-crm.js',
            '20-job-settings.js',
            '23-won-deals.js',
            '14-profile.js',
            '12-settings.js',
            
            // Layer 11: Calendar
            '27-calendar-page.js',

            // Layer 11b: Customer signature (DocuSign envelopes)
            '29-docusign.js',

            // Layer 11c: Capacity Planner (uses readJobInstallMinutes/crewEffectiveMinutes from 17)
            '30-capacity-planner.js',
            // Layer 11d: Fleet & Delivery (uses recommendVehicleForJob from 17)
            '31-fleet-page.js',
            // Layer 11e: Vehicle insurance PDF upload + parsing + alerts
            '31a-vehicle-insurance.js',

            // Layer 12: Initialization (MUST BE LAST)
            '99-init.js'
        ];
        
        let current = 0;
        let errors = [];
        
        function loadNext() {
            if (current >= modules.length) {
                console.log('\n========================================');
                console.log('✓✓✓ ALL MODULES LOADED SUCCESSFULLY! ✓✓✓');
                console.log('Total modules: ' + modules.length);
                console.log('Errors: ' + errors.length);
                console.log('========================================\n');
                
                // Verify critical functions
                console.log('=== Verification ===');
                console.log('getState:', typeof getState === 'function' ? '✓' : '✗');
                console.log('getCurrentUser:', typeof getCurrentUser === 'function' ? '✓' : '✗');
                console.log('renderPage:', typeof renderPage === 'function' ? '✓' : '✗');
                console.log('renderDeals:', typeof renderDeals === 'function' ? '✓' : '✗');
                console.log('renderJobs:', typeof renderJobs === 'function' ? '✓' : '✗');
                
                // Start the app
                // setTimeout(function() {
                //     console.log('\n=== Starting Spartan CRM ===');
                //     if (typeof initSupabase === 'function') {
                //         initSupabase();
                //     }
                //     if (typeof renderPage === 'function') {
                //         renderPage();
                //     } else if (typeof renderDashboard === 'function') {
                //         renderDashboard();
                //     } else {
                //         console.log('No render function found. Manual start needed.');
                //     }
                // }, 200);

                // setTimeout(function() {
                //     console.log('\n=== Starting Spartan CRM ===');
                //     // 99-init.js already handles startup (login screen vs. loading vs. renderPage).
                //     // Don't re-trigger rendering here or it will clobber the login screen
                //     // when no user is signed in.
                // }, 200);
                return;
            }
            
            // Entries with a path separator are treated as relative to the project
            // root (e.g. 'a/b/foo.js'); bare filenames default to modules/.
            const _entry = modules[current];
            const modulePath = (_entry.indexOf('/') >= 0)
              ? _entry.replace(/^\.\.\//, '')
              : 'modules/' + _entry;
            const script = document.createElement('script');
            script.src = modulePath + '?v=' + BUILD_VERSION;
            script.onload = function() {
                console.log((current+1) + '/' + modules.length + ' ✓ ' + modules[current]);
                current++;
                loadNext();
            };
            script.onerror = function() {
                console.error((current+1) + '/' + modules.length + ' ✗ FAILED: ' + modules[current]);
                errors.push(modules[current]);
                current++;
                loadNext();
            };
            document.head.appendChild(script);
        }
        
        console.log('Loading ' + modules.length + ' modules in dependency order...\n');
        loadNext();
    </script>
</body>
</html>
