<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Spartan CRM - Modular</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="js/styles.css">
    
    <!-- External scripts -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <!-- PDF.js — used to extract text from uploaded vehicle insurance PDFs
         (parseInsurancePdf in 31a-vehicle-insurance.js). Worker is set on
         the global immediately after load so it's ready before first use. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Recharts (React-based) for Reports tab bar/line/pie charts. React 17
         is used deliberately so rptRenderChart can keep calling the legacy
         ReactDOM.render() API without needing a createRoot migration. Defer
         preserves ordering: React → ReactDOM → Recharts. -->
    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js" defer></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js" defer></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js" defer></script>
    <!-- Twilio Voice SDK v2 — exposes window.Twilio.Device for the phone module.
         Twilio's own sdk.twilio.com CDN only hosts v1 of this library; v2 lives
         on npm as @twilio/voice-sdk and is mirrored on jsDelivr (which we already
         use for Supabase). -->
    <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.11.0/dist/twilio.min.js"></script>
</head>
<body>
    <div id="app"></div>
    
    <script>
        // Supabase configuration
        var SUPABASE_URL = 'https://sedpmsgiscowohpqdjza.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_yBluf2LlIAhewDUbNz3f5w_iiCNK6eY';
        
        console.log('========================================');
        console.log('Spartan CRM - Loading Logical Modules');
        console.log('========================================\n');
        
        const BUILD_VERSION = '20260503m';

        // Logical loading order based on dependencies
        const modules = [
            // Layer 1: Core Foundation
            '01-persistence.js',
            //needed for DEALS
            '02-mock-data.js',
            '02a-mock-factory-data.js',
            '04-cad-integration.js',
            
            // Layer 2: State & Auth
            '05-state-auth-rbac.js',
            
            // Layer 3: Data Structures
            '03-jobs-workflow.js',
            
            // Layer 4: Shared UI
            '07-shared-ui.js',
            
            // Layer 5: CRM Core
            '08-sales-crm.js',
            
            // Layer 6: Feature Modules
            '14-google-maps-mock.js',  // mock exports window.initGoogleMaps / refreshMapData — used if no API key / SDK fails
            '13-leads-maps.js',
            '15-jobs-crm.js',
            '22-jobs-page.js',
            
            // Layer 7: Advanced Features
            '16-factory-crm.js',          // core: constants, persistence, mutators
            '16a-factory-glass.js',       // glass ordering subsystem (uses core)
            '16b-factory-profile.js',     // Aluplast profile ordering subsystem (uses core)
            '16c-factory-capacity.js',    // capacity engine + planner page (uses core)
            '16d-factory-pages.js',       // factory page renderers (uses everything above)
            // Manual-protocol layer (Operations Manual v3.1). Loads after the legacy
            // factory split — the new files deliberately do NOT redefine any legacy
            // global, they only ADD: FactoryState, FactoryPersistence, JobTraveler,
            // MorningGateChecklist, DispatchChecklist, ServiceTriageJob, RedTag,
            // HoldVariation, BOMGenerator, CapacityCalculator, KlaesOrderPair,
            // KPI/lead-time constants, and renderFactoryAudit (Red Tag Loss Sheet).
            'js/modules/factory/24-factory-state.js',         // FactoryState + manual enums
            'js/modules/factory/25-factory-persistence.js',   // FactoryPersistence
            'js/modules/factory/23-factory-helpers.js',       // protocol classes + helpers
            'js/modules/factory/16-factory-crm.js',           // renderer classes + audit page
            // Factory CRM Base v1.5 (scope-corrected) — 6 sections of pure
            // data classes / enums / interfaces with Factory* prefix.
            // factory-crm-base-class-diagram-v1-5-scope-corrected.md
            'js/modules/factory/27-factory-v1-jobs-frames.js',           // §1 Jobs and frames
            'js/modules/factory/28-factory-v1-people.js',                // §2 People — internal staff
            'js/modules/factory/29-factory-v1-stock.js',                 // §3 Stock + locations + QR
            'js/modules/factory/30-factory-v1-workstations-tasks.js',    // §4 Workstations + tasks + triggers
            'js/modules/factory/31-factory-v1-suppliers.js',             // §5 Suppliers + procurement (light)
            'js/modules/factory/32-factory-v1-audit.js',                 // §6 Audit trail + integrity watchers
            'js/modules/factory/33-factory-v1-cad-bridge.js',            // CAD save → FactoryJob+Frame[] graph (subscribes to setState)
            'js/modules/factory/34-factory-station-pages.js',            // Operator station queue pages (Cutting/Milling/Welding/Hardware/Reveals/Dispatch)
            // 26-cad-timing-contract.js loads LATER (Layer 11e) because it
            // decorates readJobInstallMinutes from 17-install-schedule.js.
            '17-install-schedule.js',
            '21-cm-schedule.js',
            
            // Layer 8: Financial & Reporting
            '18-accounts-crm.js',
            '25-invoicing.js',
            '26-invoicing-page.js',
            '24-commission.js',
            '09-reports.js',
            
            // Layer 9: Communication
            '06-email-tracking.js',
            '10-integrations.js',
            '11-email-page.js',
            '28-twilio.js',            // Twilio Voice/SMS — must load AFTER 10-integrations.js (reads getState().gmailToken) and BEFORE 99-init.js (calls twilioInit)
            '14a-google-maps-real.js', // must load AFTER 11-email-page.js so it can wrap the real onGoogleMapsLoaded instead of being clobbered by it

            // Layer 10: Service & Settings
            '19-service-crm.js',
            '20-job-settings.js',
            '23-won-deals.js',
            '14-profile.js',
            '12-settings.js',
            
            // Layer 11: Calendar
            '27-calendar-page.js',

            // Layer 11b: Customer signature (DocuSign envelopes)
            '29-docusign.js',

            // Layer 11c: Capacity Planner (uses readJobInstallMinutes/crewEffectiveMinutes from 17)
            '30-capacity-planner.js',
            // Layer 11d: Fleet & Delivery (uses recommendVehicleForJob from 17)
            '31-fleet-page.js',
            // Layer 11e: Vehicle insurance PDF upload + parsing + alerts
            '31a-vehicle-insurance.js',

            // Layer 11e: CAD Timing Contract — codifies the 11-key station
            // contract + supply_only schedule-side override (audit §4.4).
            // Decorates readJobInstallMinutes (from 17), so MUST load after
            // 17, 30, 31. CONSUMERS that want the canonical reader: just call
            // readJobInstallMinutes(job) — it's been wrapped in place.
            'js/modules/factory/26-cad-timing-contract.js',

            // Layer 12: Initialization (MUST BE LAST)
            '99-init.js'
        ];
        
        let current = 0;
        let errors = [];
        
        function loadNext() {
            if (current >= modules.length) {
                console.log('\n========================================');
                console.log('✓✓✓ ALL MODULES LOADED SUCCESSFULLY! ✓✓✓');
                console.log('Total modules: ' + modules.length);
                console.log('Errors: ' + errors.length);
                console.log('========================================\n');
                
                // Verify critical functions
                console.log('=== Verification ===');
                console.log('getState:', typeof getState === 'function' ? '✓' : '✗');
                console.log('getCurrentUser:', typeof getCurrentUser === 'function' ? '✓' : '✗');
                console.log('renderPage:', typeof renderPage === 'function' ? '✓' : '✗');
                console.log('renderDeals:', typeof renderDeals === 'function' ? '✓' : '✗');
                console.log('renderJobs:', typeof renderJobs === 'function' ? '✓' : '✗');
                
                // Start the app
                // setTimeout(function() {
                //     console.log('\n=== Starting Spartan CRM ===');
                //     if (typeof initSupabase === 'function') {
                //         initSupabase();
                //     }
                //     if (typeof renderPage === 'function') {
                //         renderPage();
                //     } else if (typeof renderDashboard === 'function') {
                //         renderDashboard();
                //     } else {
                //         console.log('No render function found. Manual start needed.');
                //     }
                // }, 200);

                // setTimeout(function() {
                //     console.log('\n=== Starting Spartan CRM ===');
                //     // 99-init.js already handles startup (login screen vs. loading vs. renderPage).
                //     // Don't re-trigger rendering here or it will clobber the login screen
                //     // when no user is signed in.
                // }, 200);
                return;
            }
            
            // Entries with a path separator are treated as relative to the project
            // root (e.g. 'js/modules/factory/24-factory-state.js'); bare filenames
            // default to the legacy modules/ directory.
            const _entry = modules[current];
            const modulePath = (_entry.indexOf('/') >= 0)
              ? _entry.replace(/^\.\.\//, '')
              : 'modules/' + _entry;
            const script = document.createElement('script');
            script.src = modulePath + '?v=' + BUILD_VERSION;
            script.onload = function() {
                console.log((current+1) + '/' + modules.length + ' ✓ ' + modules[current]);
                current++;
                loadNext();
            };
            script.onerror = function() {
                console.error((current+1) + '/' + modules.length + ' ✗ FAILED: ' + modules[current]);
                errors.push(modules[current]);
                current++;
                loadNext();
            };
            document.head.appendChild(script);
        }
        
        console.log('Loading ' + modules.length + ' modules in dependency order...\n');
        loadNext();
    </script>
</body>
</html>
